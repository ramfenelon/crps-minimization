name: crps-minimization
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - setuptools=69.5.1
  - numpy=1.26
  - scipy=1.13
  - scikit-learn=1.5
  - pandas=2.2
  - matplotlib=3.9
  - seaborn=0.13
  - mlflow=2.14
  - pytest=8.2
  - pre-commit
  - pip:
    - properscoring
    - dvc[azure]==3.51
    - hydra-core==1.3
    - ngboost
    - scikit-posthocs
    - invoke
    - pytest-cov
    - azureml-mlflow